<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Puff & Chill">
<meta name="theme-color" content="#0b1511">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Puff & Chill</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }

body {
  background: #0b1511;
  color: #e0e0e0;
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* Force portrait orientation feel even in landscape */
#playerScreen {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  background: #0f2119;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 100px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.logo {
  font-size: 26px;
  font-weight: bold;
  color: #ffdf94;
  text-shadow: 0 0 18px rgba(255,223,148,0.4);
  letter-spacing: 3px;
  margin-bottom: 24px;
  margin-top: 8px;
  user-select: none;
  cursor: default;
  padding: 8px 18px;
  border-radius: 10px;
  transition: background 0.2s;
  flex-shrink: 0;
}
.logo.pressing { background: rgba(255,223,148,0.08); }

.folders-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
  width: 100%;
  max-width: 440px;
}

.folder {
  background: #1a3327;
  border: 2px solid #b39247;
  border-radius: 14px;
  padding: 18px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.folder:active { background: #234737; transform: scale(0.96); }
.folder .icon { font-size: 36px; margin-bottom: 8px; }
.folder .fname { font-weight: bold; font-size: 15px; color: #ffdf94; }
.folder .status { font-size: 11px; color: #8fa89b; margin-top: 4px; }

.keypad-container {
  margin-top: 16px;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 440px;
}
.keypad-title { font-size: 13px; color: #8fa89b; }
.code-display {
  background: #070d0a;
  width: 160px;
  height: 40px;
  line-height: 40px;
  text-align: center;
  font-size: 22px;
  color: #ffdf94;
  letter-spacing: 8px;
  border-radius: 8px;
  border: 1px solid #2d4a3a;
}
.grid-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 160px; }
.key {
  background: #162a20;
  border: 1px solid #b39247;
  color: #e0e0e0;
  padding: 10px;
  font-size: 17px;
  border-radius: 8px;
  cursor: pointer;
  text-align: center;
  user-select: none;
  transition: background 0.15s;
}
.key:active { background: #2d4a3a; }
.key-del { background: #3a1515 !important; border-color: #d9534f !important; }
.key-ok { background: #153a1a !important; border-color: #5cb85c !important; }
.keypad-cancel { font-size: 12px; color: #8fa89b; cursor: pointer; text-decoration: underline; }

/* Admin Login Overlay */
#adminLoginOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
#adminLoginOverlay.active { display: flex; }
#adminLoginOverlay .title { color: #ffdf94; font-size: 20px; font-weight: bold; }
#adminLoginOverlay .subtitle { color: #8fa89b; font-size: 13px; }
#adminLoginOverlay .code-display {
  background: #070d0a;
  width: 160px; height: 40px; line-height: 40px;
  text-align: center; font-size: 22px; color: #ffdf94;
  letter-spacing: 8px; border-radius: 8px; border: 1px solid #b39247;
}
#adminLoginOverlay .grid-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 160px; }
#adminLoginOverlay .cancel-btn { color: #8fa89b; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 4px; }
.admin-error { color: #d9534f; font-size: 13px; min-height: 18px; }

/* Admin Screen */
#adminScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: #121c18;
  z-index: 150;
  flex-direction: column;
  overflow: hidden;
}
#adminScreen.active { display: flex; }
.admin-header {
  background: #0f2119;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid #b39247;
  flex-shrink: 0;
}
.admin-header h2 { color: #ffdf94; font-size: 18px; }
.admin-close {
  background: #3a1515; border: 1px solid #d9534f;
  color: #d9534f; padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-size: 14px;
}
.admin-body { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
.admin-box {
  background: #162a20; padding: 14px; border-radius: 10px;
  margin-bottom: 14px; border: 1px solid #2d4a3a;
}
.admin-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px; gap: 8px; font-size: 14px;
}
.admin-row:last-child { margin-bottom: 0; }

input[type="text"] {
  background: #070d0a; border: 1px solid #b39247; color: white;
  padding: 6px 10px; border-radius: 6px; width: 120px;
  text-align: center; font-size: 13px;
}

/* Add Folder Button */
.btn-add-folder {
  background: #1a3327;
  border: 2px dashed #b39247;
  color: #b39247;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  width: 100%;
  max-width: 500px;
  margin-top: 4px;
  text-align: center;
  transition: background 0.2s;
}
.btn-add-folder:active { background: #234737; }

/* Delete folder button inside admin */
.btn-del-folder {
  background: #3a1515;
  border: 1px solid #d9534f;
  color: #d9534f;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  margin-top: 4px;
  width: 100%;
  text-align: center;
}
.btn-del-folder:active { background: #5a2020; }

/* Toggle switch */
.switch { position: relative; display: inline-block; width: 46px; height: 22px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #555; transition: .3s; border-radius: 22px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background: #5cb85c; }
input:checked + .slider:before { transform: translateX(24px); }

/* File section */
.file-section { margin-top: 10px; }
.file-section-title { font-size: 12px; color: #b39247; margin-bottom: 6px; }
.file-list-inner { background: #070d0a; border-radius: 6px; padding: 6px; min-height: 28px; }
.file-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 2px; color: #a3c2b2; font-size: 13px;
  border-bottom: 1px solid #1a2e22;
}
.file-item:last-child { border-bottom: none; }
.file-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; cursor: pointer; }
.file-item span:hover { color: #ffdf94; }
.btn-del { color: #d9534f; cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 0 4px; }
.btn-add {
  background: #1e4d22; color: #5cb85c; border: 1px solid #5cb85c;
  padding: 7px 10px; border-radius: 6px; cursor: pointer;
  font-size: 12px; margin-top: 8px; width: 100%; transition: background 0.2s;
}
.btn-add:active { background: #2a6e30; }
.empty-files { color: #4a6a5a; font-size: 12px; text-align: center; padding: 6px; }

.admin-pass-section {
  background: #1a2e22; border: 1px solid #b39247;
  border-radius: 10px; padding: 14px; margin-bottom: 14px;
}
.admin-pass-section h3 { color: #ffdf94; font-size: 14px; margin-bottom: 10px; }

/* File overlay */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
  padding: 20px;
}
.overlay.active { display: flex; }
.overlay-close { position: absolute; top: 14px; left: 14px; font-size: 32px; cursor: pointer; color: #ffdf94; }
.overlay-title { color: #ffdf94; font-size: 18px; font-weight: bold; margin-bottom: 16px; text-align: center; }
.overlay-body {
  max-width: 90vw; max-height: 75vh;
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; overflow-y: auto;
}
.overlay-body img { max-width: 100%; max-height: 65vh; border-radius: 8px; border: 1px solid #b39247; }
.overlay-body video { max-width: 100%; max-height: 65vh; border-radius: 8px; }
.overlay-body .txt-content {
  background: #0f2119; color: #c5e0c8; padding: 16px; border-radius: 8px;
  font-size: 14px; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; min-width: 260px;
}
.file-thumb { display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 6px; }
.file-thumb span { font-size: 12px; color: #8fa89b; max-width: 110px; text-align: center; word-break: break-all; }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a3327; border: 1px solid #b39247; color: #ffdf94;
  padding: 10px 22px; border-radius: 10px; font-size: 14px;
  z-index: 400; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Install banner */
#install-banner {
  display: none; background: #1a3327; border-top: 1px solid #b39247;
  padding: 10px 16px; text-align: center; font-size: 13px;
  position: fixed; bottom: 0; width: 100%; z-index: 50;
}
#install-banner button {
  background: #b39247; color: #0b1511; border: none;
  padding: 6px 16px; border-radius: 6px; font-weight: bold;
  cursor: pointer; margin-right: 10px;
}
#install-banner .dismiss { color: #8fa89b; cursor: pointer; font-size: 12px; }

/* Confirm dialog */
#confirmDialog {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 500;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; padding: 20px;
}
#confirmDialog.active { display: flex; }
#confirmDialog .confirm-box {
  background: #162a20; border: 2px solid #d9534f;
  border-radius: 14px; padding: 24px 20px;
  text-align: center; max-width: 300px; width: 100%;
}
#confirmDialog .confirm-title { color: #ffdf94; font-size: 16px; font-weight: bold; margin-bottom: 8px; }
#confirmDialog .confirm-msg { color: #8fa89b; font-size: 13px; margin-bottom: 20px; }
#confirmDialog .confirm-btns { display: flex; gap: 10px; justify-content: center; }
#confirmDialog .btn-confirm-yes {
  background: #3a1515; border: 1px solid #d9534f; color: #d9534f;
  padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
}
#confirmDialog .btn-confirm-no {
  background: #1e4d22; border: 1px solid #5cb85c; color: #5cb85c;
  padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
}
</style>
</head>
<body>

<div id="playerScreen">
  <div class="logo" id="logoBtn">🌿 PUFF &amp; CHILL</div>
  <div class="folders-container" id="foldersGrid"></div>
  <div class="keypad-container" id="keypadArea">
    <div class="keypad-title" id="keypadTitle">הזן קוד גישה</div>
    <div class="code-display" id="codeDisplay">_ _ _ _</div>
    <div class="grid-keypad">
      <div class="key" onclick="pressKey('1')">1</div>
      <div class="key" onclick="pressKey('2')">2</div>
      <div class="key" onclick="pressKey('3')">3</div>
      <div class="key" onclick="pressKey('4')">4</div>
      <div class="key" onclick="pressKey('5')">5</div>
      <div class="key" onclick="pressKey('6')">6</div>
      <div class="key" onclick="pressKey('7')">7</div>
      <div class="key" onclick="pressKey('8')">8</div>
      <div class="key" onclick="pressKey('9')">9</div>
      <div class="key key-del" onclick="pressKey('C')">⌫</div>
      <div class="key" onclick="pressKey('0')">0</div>
      <div class="key key-ok" onclick="pressKey('E')">✓</div>
    </div>
    <div class="keypad-cancel" onclick="closeKeypad()">ביטול</div>
  </div>
</div>

<!-- Admin Login -->
<div id="adminLoginOverlay">
  <div class="title">🔐 כניסת מנהל</div>
  <div class="subtitle">הזן קוד מנהל</div>
  <div class="code-display" id="adminCodeDisplay">_ _ _ _</div>
  <div class="admin-error" id="adminError"></div>
  <div class="grid-keypad">
    <div class="key" onclick="adminKey('1')">1</div>
    <div class="key" onclick="adminKey('2')">2</div>
    <div class="key" onclick="adminKey('3')">3</div>
    <div class="key" onclick="adminKey('4')">4</div>
    <div class="key" onclick="adminKey('5')">5</div>
    <div class="key" onclick="adminKey('6')">6</div>
    <div class="key" onclick="adminKey('7')">7</div>
    <div class="key" onclick="adminKey('8')">8</div>
    <div class="key" onclick="adminKey('9')">9</div>
    <div class="key key-del" onclick="adminKey('C')">⌫</div>
    <div class="key" onclick="adminKey('0')">0</div>
    <div class="key key-ok" onclick="adminKey('E')">✓</div>
  </div>
  <div class="cancel-btn" onclick="closeAdminLogin()">ביטול</div>
</div>

<!-- Admin Screen -->
<div id="adminScreen">
  <div class="admin-header">
    <h2>⚙️ הגדרות מערכת</h2>
    <div class="admin-close" onclick="closeAdmin()">✕ יציאה</div>
  </div>
  <div class="admin-body">
    <div class="admin-pass-section">
      <h3>🔑 שינוי קוד מנהל</h3>
      <div class="admin-row">
        <span>קוד חדש:</span>
        <input type="text" id="adminCodeInput" maxlength="4" pattern="[0-9]*" inputmode="numeric" placeholder="4 ספרות">
      </div>
      <button class="btn-add" onclick="saveAdminCode()">💾 שמור קוד מנהל</button>
    </div>
    <div id="adminRoot"></div>
    <button class="btn-add-folder" onclick="addFolder()">➕ הוסף תיקייה חדשה</button>
  </div>
</div>

<!-- File Overlay -->
<div class="overlay" id="fileOverlay">
  <div class="overlay-close" onclick="closeOverlay()">✕</div>
  <div class="overlay-title" id="overlayTitle"></div>
  <div class="overlay-body" id="overlayBody"></div>
</div>

<!-- Confirm Dialog -->
<div id="confirmDialog">
  <div class="confirm-box">
    <div class="confirm-title">🗑️ מחיקת תיקייה</div>
    <div class="confirm-msg" id="confirmMsg">האם למחוק את התיקייה וכל הקבצים שבה?</div>
    <div class="confirm-btns">
      <div class="btn-confirm-yes" onclick="confirmYes()">מחק</div>
      <div class="btn-confirm-no" onclick="confirmNo()">ביטול</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="install-banner">
  📲 התקן את האפליקציה על מסך הבית
  <button id="install-btn">התקן</button>
  <span class="dismiss" onclick="document.getElementById('install-banner').style.display='none'">לא עכשיו</span>
</div>

<input type="file" id="fileInput" multiple accept="*/*" style="display:none">

<script>
const DB_KEY = 'puffchill_v3', ADMIN_CODE_KEY = 'puffchill_admincode';
const DEFAULT_DATA = {
  folders: {
    1: { name: "תיקייה 1", isLocked: true, code: "1111", files: [] },
    2: { name: "תיקייה 2", isLocked: false, code: "", files: [] },
    3: { name: "תיקייה 3", isLocked: false, code: "", files: [] },
    4: { name: "תיקייה 4", isLocked: false, code: "", files: [] }
  },
  nextId: 5
};

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(DB_KEY));
    if (d) {
      if (!d.nextId) d.nextId = Object.keys(d.folders).length + 1;
      return d;
    }
    return JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(appData)); }
  catch(e) { showToast('שגיאה בשמירה'); }
}
function getAdminCode() { return localStorage.getItem(ADMIN_CODE_KEY) || '0000'; }
function setAdminCode(c) { localStorage.setItem(ADMIN_CODE_KEY, c); }

let appData = loadData(), activeFolderId = null, currentInputCode = '';
let db;

// IndexedDB
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('PuffChillFiles', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files', { keyPath: 'id' });
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = rej;
  });
}
function saveFile(id, file) {
  return new Promise((res, rej) => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').put({ id, file });
    tx.oncomplete = res; tx.onerror = rej;
  });
}
function getFile(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction('files', 'readonly');
    const req = tx.objectStore('files').get(id);
    req.onsuccess = e => res(e.target.result?.file || null);
    req.onerror = rej;
  });
}
function deleteFileDB(id) {
  return new Promise(res => {
    const tx = db.transaction('files', 'readwrite');
    tx.objectStore('files').delete(id);
    tx.oncomplete = res;
  });
}

function showToast(msg, d = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), d);
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fileIcon(n) {
  const e = n.split('.').pop().toLowerCase();
  if (['jpg','jpeg','png','gif','webp'].includes(e)) return '🖼️';
  if (['mp4','webm','mov'].includes(e)) return '🎬';
  if (['mp3','wav','ogg'].includes(e)) return '🎵';
  if (['pdf'].includes(e)) return '📄';
  if (['txt','md'].includes(e)) return '📝';
  return '📎';
}

// ─── PLAYER ───
function renderPlayer() {
  const g = document.getElementById('foldersGrid');
  g.innerHTML = '';
  for (let id in appData.folders) {
    const f = appData.folders[id];
    const d = document.createElement('div');
    d.className = 'folder';
    d.onclick = () => clickFolder(Number(id));
    d.innerHTML = `
      <div class="icon">${f.isLocked ? '🔒' : '📂'}</div>
      <div class="fname">${escHtml(f.name)}</div>
      <div class="status">${f.isLocked ? 'נעול' : 'פתוח'} · ${f.files.length} קבצים</div>
    `;
    g.appendChild(d);
  }
}

// ─── ADMIN ───
function renderAdmin() {
  const root = document.getElementById('adminRoot');
  root.innerHTML = '';
  document.getElementById('adminCodeInput').value = getAdminCode();

  for (let id in appData.folders) {
    const f = appData.folders[id];
    const box = document.createElement('div');
    box.className = 'admin-box';
    box.id = `admin-box-${id}`;
    box.innerHTML = `
      <div class="admin-row">
        <strong>${escHtml(f.name)}</strong>
        <label class="switch">
          <input type="checkbox" ${f.isLocked ? 'checked' : ''} onchange="toggleLock(${id},this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="admin-row">
        <span>שם:</span>
        <input type="text" value="${escHtml(f.name)}" oninput="updateName(${id},this.value)">
      </div>
      <div class="admin-row" id="code-row-${id}" style="display:${f.isLocked ? 'flex' : 'none'}">
        <span>קוד:</span>
        <input type="text" value="${escHtml(f.code)}" maxlength="4" inputmode="numeric" oninput="updateCode(${id},this.value)">
      </div>
      <div class="file-section">
        <div class="file-section-title">📁 קבצים (${f.files.length})</div>
        <div class="file-list-inner" id="files-${id}"></div>
        <button class="btn-add" onclick="triggerUpload(${id})">📤 העלה קבצים</button>
      </div>
      <button class="btn-del-folder" onclick="askDeleteFolder(${id})">🗑️ מחק תיקייה</button>
    `;
    root.appendChild(box);
    renderFileList(id);
  }
}

function renderFileList(id) {
  const c = document.getElementById(`files-${id}`);
  if (!c) return;
  c.innerHTML = '';
  const files = appData.folders[id].files;
  if (!files.length) { c.innerHTML = '<div class="empty-files">אין קבצים עדיין</div>'; return; }
  files.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span onclick="previewFile('${f.id}','${escHtml(f.name)}')">${fileIcon(f.name)} ${escHtml(f.name)}</span>
      <span class="btn-del" onclick="deleteFile(${id},${i},'${f.id}')">🗑️</span>
    `;
    c.appendChild(item);
  });
}

function saveAdminCode() {
  const v = document.getElementById('adminCodeInput').value.replace(/[^0-9]/g,'').slice(0,4);
  if (v.length < 4) { showToast('הקוד חייב להיות 4 ספרות'); return; }
  setAdminCode(v);
  showToast('✅ קוד מנהל עודכן!');
}

function toggleLock(id, c) {
  appData.folders[id].isLocked = c;
  saveData(); renderAdmin(); renderPlayer();
}
function updateName(id, v) {
  appData.folders[id].name = v;
  saveData(); renderPlayer();
}
function updateCode(id, v) {
  appData.folders[id].code = v.replace(/[^0-9]/g,'').slice(0,4);
  saveData();
}

// ─── ADD FOLDER ───
function addFolder() {
  const id = appData.nextId++;
  appData.folders[id] = { name: `תיקייה ${id}`, isLocked: false, code: '', files: [] };
  saveData();
  renderAdmin();
  renderPlayer();
  showToast('✅ תיקייה נוספה!');
}

// ─── DELETE FOLDER ───
let pendingDeleteId = null;
function askDeleteFolder(id) {
  pendingDeleteId = id;
  const fname = appData.folders[id]?.name || 'תיקייה';
  document.getElementById('confirmMsg').textContent = `האם למחוק את "${fname}" וכל הקבצים שבה?`;
  document.getElementById('confirmDialog').classList.add('active');
}
async function confirmYes() {
  if (pendingDeleteId === null) return;
  const id = pendingDeleteId;
  document.getElementById('confirmDialog').classList.remove('active');
  // Delete all files from IndexedDB
  const files = appData.folders[id]?.files || [];
  for (const f of files) { await deleteFileDB(f.id); }
  delete appData.folders[id];
  pendingDeleteId = null;
  saveData();
  renderAdmin();
  renderPlayer();
  showToast('🗑️ תיקייה נמחקה');
}
function confirmNo() {
  pendingDeleteId = null;
  document.getElementById('confirmDialog').classList.remove('active');
}

// ─── UPLOAD ───
let currentUploadFolder = null;
function triggerUpload(id) {
  currentUploadFolder = id;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInput').click();
}
document.getElementById('fileInput').addEventListener('change', async function() {
  const files = Array.from(this.files);
  if (!files.length || currentUploadFolder === null) return;
  let added = 0;
  for (const file of files) {
    const fid = 'f_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    try {
      await saveFile(fid, file);
      appData.folders[currentUploadFolder].files.push({ id: fid, name: file.name });
      added++;
    } catch(e) { showToast('שגיאה: ' + file.name); }
  }
  saveData();
  renderFileList(currentUploadFolder);
  renderPlayer();
  showToast(`✅ ${added} קבצים הועלו`);
});

async function deleteFile(fid, index, fileId) {
  await deleteFileDB(fileId);
  appData.folders[fid].files.splice(index, 1);
  saveData(); renderFileList(fid); renderPlayer();
  showToast('🗑️ קובץ נמחק');
}

// ─── PREVIEW ───
async function previewFile(fileId, fileName) {
  const file = await getFile(fileId);
  if (!file) { showToast('הקובץ לא נמצא'); return; }
  const overlay = document.getElementById('fileOverlay');
  const body = document.getElementById('overlayBody');
  document.getElementById('overlayTitle').textContent = fileName;
  body.innerHTML = '';
  const ext = fileName.split('.').pop().toLowerCase();
  const url = URL.createObjectURL(file);
  if (['jpg','jpeg','png','gif','webp'].includes(ext)) {
    const img = document.createElement('img'); img.src = url; body.appendChild(img);
  } else if (['mp4','webm','mov'].includes(ext)) {
    const v = document.createElement('video'); v.src = url; v.controls = true; v.autoplay = true; body.appendChild(v);
  } else if (['mp3','wav','ogg'].includes(ext)) {
    const a = document.createElement('audio'); a.src = url; a.controls = true; a.autoplay = true; body.appendChild(a);
  } else if (['txt','md'].includes(ext)) {
    const text = await file.text();
    const pre = document.createElement('pre'); pre.className = 'txt-content'; pre.textContent = text; body.appendChild(pre);
  } else {
    body.innerHTML = `<div class="txt-content">לא ניתן להציג .${ext}<br><a href="${url}" download="${fileName}" style="color:#ffdf94;">הורד</a></div>`;
  }
  overlay.classList.add('active');
}
function closeOverlay() {
  document.getElementById('fileOverlay').classList.remove('active');
  document.getElementById('overlayBody').innerHTML = '';
}

// ─── FOLDER CLICK ───
function clickFolder(id) {
  activeFolderId = id;
  currentInputCode = '';
  updateDisplay();
  const f = appData.folders[id];
  if (f.isLocked) {
    document.getElementById('keypadTitle').textContent = `קוד: ${escHtml(f.name)}`;
    document.getElementById('keypadArea').style.display = 'flex';
  } else {
    openFolder(id);
  }
}
function openFolder(id) {
  document.getElementById('keypadArea').style.display = 'none';
  const f = appData.folders[id];
  if (!f.files.length) { showToast(`📂 "${f.name}" — אין קבצים`); return; }
  showFolderViewer(id);
}
async function showFolderViewer(id) {
  const f = appData.folders[id];
  const overlay = document.getElementById('fileOverlay');
  const body = document.getElementById('overlayBody');
  document.getElementById('overlayTitle').textContent = `📂 ${f.name}`;
  body.innerHTML = '';
  for (const fileRef of f.files) {
    const file = await getFile(fileRef.id);
    const ext = fileRef.name.split('.').pop().toLowerCase();
    const div = document.createElement('div');
    div.className = 'file-thumb';
    if (file && ['jpg','jpeg','png','gif','webp'].includes(ext)) {
      const url = URL.createObjectURL(file);
      div.innerHTML = `<img src="${url}" style="max-width:120px;max-height:100px;border-radius:6px;border:1px solid #b39247;">`;
    } else {
      div.innerHTML = `<div style="font-size:40px;">${fileIcon(fileRef.name)}</div>`;
    }
    div.innerHTML += `<span>${escHtml(fileRef.name)}</span>`;
    div.onclick = () => previewFile(fileRef.id, fileRef.name);
    body.appendChild(div);
  }
  overlay.classList.add('active');
}

// ─── KEYPAD ───
function pressKey(key) {
  if (!activeFolderId) return;
  if (key === 'C') {
    currentInputCode = currentInputCode.slice(0, -1);
  } else if (key === 'E') {
    if (currentInputCode === appData.folders[activeFolderId].code) {
      showToast('✅ פיצוח הצליח!');
      document.getElementById('keypadArea').style.display = 'none';
      openFolder(activeFolderId);
    } else {
      showToast('❌ קוד שגוי');
      currentInputCode = '';
    }
  } else {
    if (currentInputCode.length < 4) currentInputCode += key;
  }
  updateDisplay();
}
function updateDisplay() {
  const d = currentInputCode.length;
  document.getElementById('codeDisplay').textContent = '●'.repeat(d) + '_ '.repeat(4 - d).trim();
}
function closeKeypad() {
  document.getElementById('keypadArea').style.display = 'none';
  currentInputCode = '';
  activeFolderId = null;
}

// ─── ADMIN LOGIN ───
let adminInputCode = '';
function openAdminLogin() {
  adminInputCode = '';
  updateAdminDisplay();
  document.getElementById('adminError').textContent = '';
  document.getElementById('adminLoginOverlay').classList.add('active');
}
function closeAdminLogin() {
  document.getElementById('adminLoginOverlay').classList.remove('active');
  adminInputCode = '';
}
function adminKey(key) {
  if (key === 'C') {
    adminInputCode = adminInputCode.slice(0, -1);
  } else if (key === 'E') {
    if (adminInputCode === getAdminCode()) {
      closeAdminLogin(); openAdmin();
    } else {
      document.getElementById('adminError').textContent = '❌ קוד שגוי';
      adminInputCode = '';
    }
  } else {
    if (adminInputCode.length < 4) adminInputCode += key;
  }
  updateAdminDisplay();
}
function updateAdminDisplay() {
  const d = adminInputCode.length;
  document.getElementById('adminCodeDisplay').textContent = '●'.repeat(d) + '_ '.repeat(4 - d).trim();
}
function openAdmin() { renderAdmin(); document.getElementById('adminScreen').classList.add('active'); }
function closeAdmin() { document.getElementById('adminScreen').classList.remove('active'); renderPlayer(); }

// ─── LOGO LONG PRESS ───
const logoBtn = document.getElementById('logoBtn');
let logoTimer = null;
logoBtn.addEventListener('pointerdown', () => {
  logoBtn.classList.add('pressing');
  logoTimer = setTimeout(() => { logoBtn.classList.remove('pressing'); openAdminLogin(); }, 1500);
});
logoBtn.addEventListener('pointerup', () => { clearTimeout(logoTimer); logoBtn.classList.remove('pressing'); });
logoBtn.addEventListener('pointerleave', () => { clearTimeout(logoTimer); logoBtn.classList.remove('pressing'); });

// ─── PWA INSTALL ───
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'block';
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') showToast('✅ הותקן!');
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

// ─── INIT ───
openDB().then(() => renderPlayer()).catch(() => renderPlayer());
</script>
