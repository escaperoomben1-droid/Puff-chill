<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Puff & Chill">
<meta name="theme-color" content="#0b1511">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Puff & Chill</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }

body { background: #0b1511; color: #e0e0e0; min-height: 100dvh; overflow-y: auto; }

#playerScreen { width: 100%; min-height: 100dvh; background: #0f2119; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

.logo { font-size: 32px; font-weight: bold; color: #ffdf94; text-shadow: 0 0 18px rgba(255,223,148,0.4); letter-spacing: 3px; margin-bottom: 40px; user-select: none; cursor: default; padding: 10px 20px; border-radius: 10px; transition: background 0.2s; }
.logo.pressing { background: rgba(255,223,148,0.08); }
.folders-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; }
.folder { background: #1a3327; border: 2px solid #b39247; border-radius: 14px; padding: 24px 14px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.folder:active { background: #234737; transform: scale(0.96); }
.folder .icon { font-size: 44px; margin-bottom: 10px; }
.folder .fname { font-weight: bold; font-size: 16px; color: #ffdf94; }
.folder .status { font-size: 12px; color: #8fa89b; margin-top: 5px; }
.keypad-container { margin-top: 30px; display: none; flex-direction: column; align-items: center; gap: 14px; }
.keypad-title { font-size: 14px; color: #8fa89b; }
.code-display { background: #070d0a; width: 200px; height: 52px; line-height: 52px; text-align: center; font-size: 28px; color: #ffdf94; letter-spacing: 10px; border-radius: 8px; border: 1px solid #2d4a3a; }
.grid-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; }
.key { background: #162a20; border: 1px solid #b39247; color: #e0e0e0; padding: 16px; font-size: 20px; border-radius: 8px; cursor: pointer; text-align: center; user-select: none; transition: background 0.15s; }
.key:active { background: #2d4a3a; }
.key-del { background: #3a1515 !important; border-color: #d9534f !important; }
.key-ok { background: #153a1a !important; border-color: #5cb85c !important; }
.keypad-cancel { font-size: 12px; color: #8fa89b; cursor: pointer; text-decoration: underline; }
#adminLoginOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
#adminLoginOverlay.active { display: flex; }
#adminLoginOverlay .title { color: #ffdf94; font-size: 20px; font-weight: bold; }
#adminLoginOverlay .subtitle { color: #8fa89b; font-size: 13px; }
#adminLoginOverlay .code-display { background: #070d0a; width: 200px; height: 52px; line-height: 52px; text-align: center; font-size: 28px; color: #ffdf94; letter-spacing: 10px; border-radius: 8px; border: 1px solid #b39247; }
#adminLoginOverlay .grid-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 200px; }
#adminLoginOverlay .cancel-btn { color: #8fa89b; font-size: 12px; cursor: pointer; text-decoration: underline; margin-top: 4px; }
.admin-error { color: #d9534f; font-size: 13px; min-height: 18px; }
#adminScreen { display: none; position: fixed; inset: 0; background: #121c18; z-index: 150; flex-direction: column; overflow: hidden; }
#adminScreen.active { display: flex; }
.admin-header { background: #0f2119; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #b39247; }
.admin-header h2 { color: #ffdf94; font-size: 18px; }
.admin-close { background: #3a1515; border: 1px solid #d9534f; color: #d9534f; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
.admin-body { flex: 1; overflow-y: auto; padding: 16px; }
.admin-box { background: #162a20; padding: 14px; border-radius: 10px; margin-bottom: 14px; border: 1px solid #2d4a3a; }
.admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; font-size: 14px; }
.admin-row:last-child { margin-bottom: 0; }
input[type="text"] { background: #070d0a; border: 1px solid #b39247; color: white; padding: 6px 10px; border-radius: 6px; width: 120px; text-align: center; font-size: 13px; }
.switch { position: relative; display: inline-block; width: 46px; height: 22px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; inset: 0; background: #555; transition: .3s; border-radius: 22px; }
.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 4px; bottom: 4px; background: white; transition: .3s; border-radius: 50%; }
input:checked + .slider { background: #5cb85c; }
input:checked + .slider:before { transform: translateX(24px); }
.file-section { margin-top: 10px; }
.file-section-title { font-size: 12px; color: #b39247; margin-bottom: 6px; }
.file-list-inner { background: #070d0a; border-radius: 6px; padding: 6px; min-height: 28px; }
.file-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 2px; color: #a3c2b2; font-size: 13px; border-bottom: 1px solid #1a2e22; }
.file-item:last-child { border-bottom: none; }
.file-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; cursor: pointer; }
.file-item span:hover { color: #ffdf94; }
.btn-del { color: #d9534f; cursor: pointer; font-size: 16px; flex-shrink: 0; padding: 0 4px; }
.btn-add { background: #1e4d22; color: #5cb85c; border: 1px solid #5cb85c; padding: 7px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 8px; width: 100%; transition: background 0.2s; }
.btn-add:active { background: #2a6e30; }
.empty-files { color: #4a6a5a; font-size: 12px; text-align: center; padding: 6px; }
.admin-pass-section { background: #1a2e22; border: 1px solid #b39247; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.admin-pass-section h3 { color: #ffdf94; font-size: 14px; margin-bottom: 10px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 300; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
.overlay.active { display: flex; }
.overlay-close { position: absolute; top: 14px; left: 14px; font-size: 32px; cursor: pointer; color: #ffdf94; }
.overlay-title { color: #ffdf94; font-size: 18px; font-weight: bold; margin-bottom: 16px; text-align: center; }
.overlay-body { max-width: 90vw; max-height: 75vh; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; overflow-y: auto; }
.overlay-body img { max-width: 100%; max-height: 65vh; border-radius: 8px; border: 1px solid #b39247; }
.overlay-body video { max-width: 100%; max-height: 65vh; border-radius: 8px; }
.overlay-body .txt-content { background: #0f2119; color: #c5e0c8; padding: 16px; border-radius: 8px; font-size: 14px; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; min-width: 260px; }
.file-thumb { display: flex; flex-direction: column; align-items: center; cursor: pointer; gap: 6px; }
.file-thumb span { font-size: 12px; color: #8fa89b; max-width: 110px; text-align: center; word-break: break-all; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a3327; border: 1px solid #b39247; color: #e0e0e0; padding: 12px 24px; border-radius: 8px; z-index: 400; display: none; }
.toast.active { display: block; }

/* התאמה רספונסיבית קבועה למסכים אנכיים */
@media (max-width: 1024px) {
.logo { font-size: 26px; margin-bottom: 20px; padding: 6px 12px; }
.folders-container { gap: 12px; max-width: 100%; }
.folder { padding: 16px 10px; border-radius: 10px; }
.folder .icon { font-size: 34px; margin-bottom: 6px; }
.folder .fname { font-size: 14px; }
.keypad-container { margin-top: 15px; gap: 10px; }
.key { padding: 12px; font-size: 18px; }
.code-display { height: 44px; line-height: 44px; font-size: 24px; }
}
</style>
</head>
<body>

<div id="playerScreen">
<div class="logo">Puff & Chill</div>
<div class="folders-container"></div>
<div class="keypad-container" id="keypadSection">
<div class="keypad-title">הקש קוד גישה:</div>
<div class="code-display" id="codeDisplay"></div>
<div class="grid-keypad">
<button class="key">1</button>
<button class="key">2</button>
<button class="key">3</button>
<button class="key">4</button>
<button class="key">5</button>
<button class="key">6</button>
<button class="key">7</button>
<button class="key">8</button>
<button class="key">9</button>
<button class="key key-del">דלג</button>
<button class="key">0</button>
<button class="key key-ok">אישור</button>
</div>
<div class="keypad-cancel" id="cancelKeypad">ביטול</div>
</div>
</div>

<div id="adminLoginOverlay">
<div class="title">כניסת מנהל</div>
<div class="subtitle">הקש סיסמת מנהל:</div>
